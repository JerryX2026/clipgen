# clipgen 推广视频
output: "clipgen_promo.mp4"
voice: "zh-CN-XiaoxiaoNeural"
rate: "+30%"

scenes:
  - script: "我做了一个开源工具，写一行 YAML 配置，自动生成带配音带字幕的短视频。完全免费，不需要 API Key。"
    template: title
    data:
      title: "clipgen"
      title_size: 72
      subtitle: "一行命令生成短视频"
      accent: "#00d2ff"
      tags: ["🚀 开源免费", "⚡ 一行命令", "🎙️ AI 配音"]

  - script: "安装之后，写一个 YAML 文件描述你的视频脚本和画面，跑一行 clipgen build 就行。内置 6 套模板，覆盖大部分场景。"
    template: terminal
    data:
      title: "如何使用"
      accent: "#00d2ff"
      lines:
        - text: "$ pip install clipgen"
          color: green
        - text: ""
          color: dim
        - text: "$ clipgen build hello.yaml"
          color: green
        - text: "  Building 3 scenes..."
          color: dim
        - text: "  [1/3] title       5.2s"
          color: cyan
        - text: "  [2/3] terminal    7.8s"
          color: cyan
        - text: "  [3/3] cta         3.1s"
          color: cyan
        - text: "  Merging segments..."
          color: dim
        - text: ""
          color: dim
        - text: "  Done! → hello_clipgen.mp4"
          color: green
      note: "一行命令，从文案到成品"

  - script: "所有画面用 Python 本地渲染，配音用 Edge-TTS 免费服务，字幕自动切分。不调用任何付费 API，不消耗 Token。"
    template: code_diff
    data:
      title: "纯本地 · 免费"
      accent: "#00c853"
      before:
        label: "其他方案"
        lines:
          - text: "需要 API Key"
          - text: "每次调用扣费"
          - text: "依赖网络服务"
          - text: "有额度限制"
      after:
        label: "clipgen"
        lines:
          - text: "完全本地运行"
          - text: "零成本使用"
          - text: "免费 TTS 配音"
          - text: "无需注册"
      note: "不需要任何 API Key，不消耗 token"

  - script: "你觉得还能加什么功能？评论区告诉我，我去实现。"
    template: question
    data:
      question: "想要什么功能？"
      option_a: "更多模板"
      option_b: "Web UI"
      a_color: "#00d2ff"
      b_color: "#8b5cf6"
      comment_prompt: "💬 评论区写下你的想法"

  - script: "工具已经开源在 GitHub，链接在主页。关注我，每天一个 AI 编程效率技巧。"
    template: cta
    data:
      text: "Star 支持"
      subtitle: "clipgen — 开源免费，一行命令生成短视频"
      button_text: "GitHub →"
